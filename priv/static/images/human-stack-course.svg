<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">The Human Stack course cover</title>
  <desc id="desc">Abstract green and pink shapes representing communication layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#011813"/>
      <stop offset=".68" stop-color="#009d77"/>
      <stop offset="1" stop-color="#ea4c89"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="48" fill="url(#bg)"/>
  <circle cx="1010" cy="120" r="190" fill="#f0fdf9" opacity=".18" filter="url(#blur)"/>
  <circle cx="190" cy="650" r="230" fill="#ea4c89" opacity=".22" filter="url(#blur)"/>
  <g transform="translate(130 120)">
    <rect x="0" y="0" width="210" height="420" rx="105" fill="#f0fdf9" opacity=".96"/>
    <rect x="245" y="75" width="210" height="345" rx="105" fill="#fff" opacity=".86"/>
    <rect x="490" y="150" width="210" height="270" rx="105" fill="#f0fdf9" opacity=".72"/>
    <circle cx="805" cy="315" r="105" fill="#ea4c89"/>
  </g>
  <text x="130" y="610" fill="#fff" font-family="Arial, sans-serif" font-size="58" font-weight="700">THE HUMAN STACK</text>
  <text x="134" y="662" fill="#fff" opacity=".78" font-family="Arial, sans-serif" font-size="26">COMMUNICATION · PRESENTATION · INFLUENCE</text>
</svg>
